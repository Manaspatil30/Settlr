version: '3.8'

services:

  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: settlr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       settlr_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: settlr_password
    ports:
      - "5433:5432"   # External 5433 → Internal 5432 (avoids conflict with local postgres)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis (job queues + sessions)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: settlr_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Node.js Backend API
  # ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: settlr_api
    restart: unless-stopped
    ports:
      - "5001:5000"   # External 5001 → Internal 5000
    environment:
      PORT:             5000
      NODE_ENV:         development
      DB_HOST:          postgres
      DB_PORT:          5432
      DB_NAME:          settlr_db
      DB_USER:          postgres
      DB_PASSWORD:      settlr_password
      REDIS_HOST:       redis
      REDIS_PORT:       6379
      JWT_SECRET:       2dc046a0126b1f72ae7aa0d746c8cfffb682f3bc4676b0100361fb403fbc67bb87ac542ec362174c4b3c0d53348b6b91e4135eecb5aa0996a644147c63422a87
      JWT_EXPIRES_IN:   7d
      CLIENT_URL:       http://localhost:3000
      STRIPE_SECRET_KEY:          sk_test_51TQmYtFxe8KECdzDr1wLsIOmOeulW4KsU2gqIHgoE0uT2yoae5HoOegXN4HxhbLIIvsxTdpkzXQJQ1gunuZfsDwu00bDRBcPg2
      STRIPE_WEBHOOK_SECRET:      whsec_your_webhook_secret_here
      TRUELAYER_CLIENT_ID:        sandbox-settlr-c6cf3e
      TRUELAYER_CLIENT_SECRET:    49a4ea86-5574-4759-88d6-99a7924286d4
      TRUELAYER_REDIRECT_URI:     https://novel-tba-behavior-caring.trycloudflare.com/api/banking/callback
    volumes:
      - .:/app                        # Hot reload — your code changes reflect instantly
      - /app/node_modules             # Don't overwrite container's node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
